<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Speeding Energy Flow (Cyan > Violet) -->
    <linearGradient id="cyan-violet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    
    <!-- Forward Crafting Flow (Violet > Hot Pink) -->
    <linearGradient id="violet-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#F472B6" />
    </linearGradient>
    
    <!-- Extreme drop shadow mapping to highlight overlapping glass layers -->
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="-5" dy="0" stdDeviation="4" flood-color="#000000" flood-opacity="0.6" />
    </filter>
  </defs>

  <g stroke-linejoin="round" stroke-linecap="round">
    
    <!-- BACK ARROW (Left Chevron) - Represents Technology/Base Data -->
    <polygon points="6,20 41,50 6,80 36,80 71,50 36,20" fill="url(#cyan-violet)" stroke="url(#cyan-violet)" stroke-width="4" />
    
    <!-- FRONT ARROW (Right Chevron) - Represents "Next", AI, and the Future -->
    <polygon points="31,20 66,50 31,80 61,80 96,50 61,20" fill="url(#violet-pink)" stroke="url(#violet-pink)" stroke-width="4" filter="url(#shadow)" />
    
    <!-- CRYSTAL GLASS HIGHLIGHTS (Makes the arrows look unbelievably premium and 3D) -->
    <line x1="36" y1="20" x2="71" y2="50" stroke="#ffffff" stroke-width="2" opacity="0.4" />
    <line x1="61" y1="20" x2="96" y2="50" stroke="#ffffff" stroke-width="2" opacity="0.6" />
    
    <!-- Back arrow inner gap highlight -->
    <line x1="6" y1="20" x2="41" y2="50" stroke="#ffffff" stroke-width="2" opacity="0.3" />
    
  </g>
</svg>
